    <script>
      const utmKeys = [
        "utm_source",
        "utm_medium",
        "utm_campaign",
        "utm_content",
      ];
      const refKey = "ref";

      // Store UTM and ref values from URL
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        let hasNewUTM = false;

        utmKeys.forEach((key) => {
          if (urlParams.has(key)) {
            hasNewUTM = true;
          }
        });

        if (hasNewUTM) {
          utmKeys.forEach((key) => {
            const value = urlParams.get(key);
            if (value) {
              localStorage.setItem(key, value);
            }
          });
        }

        if (urlParams.has(refKey)) {
          const ref = urlParams.get(refKey);
          if (ref) {
            localStorage.setItem(refKey, ref);
          }
        }
      })();

      function applyParamsToButtons() {
        const storedParams = new URLSearchParams();

        // Add UTM params from localStorage
        utmKeys.forEach((key) => {
          const value = localStorage.getItem(key);
          if (value) {
            storedParams.set(key, value);
          }
        });

        // Add ref param from localStorage
        const ref = localStorage.getItem(refKey);
        if (ref) {
          storedParams.set(refKey, ref);
        }

        const buttons = document.querySelectorAll("a.buy-now");
        buttons.forEach((button) => {
          try {
            const url = new URL(button.href);
            const params = new URLSearchParams(url.search);

            storedParams.forEach((value, key) => {
              params.set(key, value);
            });

            url.search = params.toString();
            button.href = url.toString();
          } catch (err) {
            console.warn("Param append error:", err);
          }
        });
      }

      window.addEventListener("DOMContentLoaded", applyParamsToButtons);

      const observer = new MutationObserver(() => {
        applyParamsToButtons();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
      });
    </script>

    <script>
      (function () {
        var origin = "https://easier-flow-367292.framer.app";
        var allowed = [
          "https://easier-flow-367292.framer.app/branding/moss",
          "https://easier-flow-367292.framer.app/work",
          "https://easier-flow-367292.framer.app/branding/rugbysantarem",
          "https://easier-flow-367292.framer.app/branding/within",
          "https://easier-flow-367292.framer.app/contact-me",
          "https://easier-flow-367292.framer.app/editorial-design",
          "https://easier-flow-367292.framer.app/graphic-design",
        ];
        var relativeRoot = "../";

        function neutralizeLink(a) {
          if (!a || a.getAttribute("data-nce-checked")) return;
          var rawHref = a.getAttribute("href");
          if (!rawHref) return;

          a.setAttribute("data-nce-checked", "true");

          // Ignore anchors, JS, mailto, tel
          if (
            rawHref.indexOf("#") === 0 ||
            rawHref.indexOf("javascript:") === 0 ||
            rawHref.indexOf("mailto:") === 0 ||
            rawHref.indexOf("tel:") === 0
          )
            return;

          try {
            // Crucial: Resolve against intended target domain, NOT local filesystem.
            var url = new URL(rawHref, origin);
            if (url.origin === origin) {
              // Internal link
              var clean = url.pathname.replace(/\/$/, "") || "/";
              var full = url.origin + clean;
              var isExported = allowed.indexOf(full) !== -1;

              if (!isExported) {
                // Block unexported pages
                a.setAttribute("href", "javascript:void(0)");
                a.removeAttribute("target");
                a.style.cursor = "default";
              }
              // If allowed, DO NOTHING! Let the SPA router handle the clean URL navigation natively.
            } else {
              // External link
              if (a.getAttribute("target") !== "_blank") {
                a.setAttribute("target", "_top");
              }
            }
          } catch (err) {}
        }

        // Process existing links immediately
        document.querySelectorAll("a[href]").forEach(neutralizeLink);

        // Watch for dynamically added links (e.g., React portals, dropdowns)
        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) {
                // ELEMENT_NODE
                if (node.tagName === "A") neutralizeLink(node);
                if (node.querySelectorAll) {
                  node.querySelectorAll("a[href]").forEach(neutralizeLink);
                }
              }
            });
            if (
              mutation.type === "attributes" &&
              mutation.attributeName === "href"
            ) {
              neutralizeLink(mutation.target);
            }
          });
        });
        // Target documentElement to catch portals/overlays injected outside <body>
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ["href"],
        });

        // Fallback event blackhole for advanced SPAs targeting unexported links
        var events = [
          "click",
          "mousedown",
          "mouseup",
          "pointerdown",
          "pointerup",
          "touchstart",
          "touchend",
        ];
        events.forEach(function (ev) {
          document.addEventListener(
            ev,
            function (e) {
              var a = e.target.closest("a");
              if (!a) return;
              var rawHref = a.getAttribute("href");
              if (!rawHref || rawHref.indexOf("#") === 0) return;

              // Blackhole neutralized links completely across all interactions
              if (rawHref.indexOf("javascript:void(0)") !== -1) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                return;
              }

              // Offline file:// routing fallback
              if (ev === "click" && window.location.protocol === "file:") {
                try {
                  var url = new URL(rawHref, origin);
                  if (url.origin === origin) {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();

                    var clean = url.pathname.replace(/\/$/, "") || "/";
                    var full = url.origin + clean;
                    var isExported = allowed.indexOf(full) !== -1;
                    if (isExported) {
                      var targetPath =
                        clean === "/"
                          ? "index.html"
                          : clean.substring(1) + "/index.html";
                      window.location.href = relativeRoot + targetPath;
                    }
                    return;
                  }
                } catch (err) {}
              }
            },
            true,
          );
        });
      })();
